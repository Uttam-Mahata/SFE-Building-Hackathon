server.port=8080
spring.application.name=payment-backend

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:paymentdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
# spring.jpa.show-sql=true # Uncomment for debugging SQL statements

# SFE Backend SDK Configuration
sfe.backend-sdk.api-key=YOUR_SFE_API_KEY_PLACEHOLDER
sfe.backend-sdk.environment=SANDBOX # Options: SANDBOX, PRODUCTION, TEST
sfe.backend-sdk.mock-mode=true
# sfe.backend-sdk.database-url= # Optional: if SDK needs a direct DB URL
# sfe.backend-sdk.fraud-detection-enabled=true
# sfe.backend-sdk.audit-logging-enabled=true
# sfe.backend-sdk.encryption-level=AES_256
# sfe.backend-sdk.latency-simulation-ms=0
